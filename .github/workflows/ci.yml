# Lint, typecheck, and production build on every push and PR to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Placeholders so `next build` can compile; APIs still need real keys at runtime.
          OPENAI_API_KEY: ci-placeholder
          NEWS1_API_URL: https://example.com
          NEWS1_API_KEY: ci-placeholder
          NEWS2_API_URL: https://example.com
          NEWS2_API_KEY: ci-placeholder
